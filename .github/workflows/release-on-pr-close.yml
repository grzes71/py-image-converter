name: Release wheel on PR close

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Prefer the merge commit for merged PRs, fallback to PR head commit.
          ref: ${{ github.event.pull_request.merge_commit_sha || github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel package
        run: python -m build --wheel

      - name: Publish GitHub release with wheel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pr-${{ github.event.pull_request.number }}-closed-${{ github.run_number }}
          name: PR #${{ github.event.pull_request.number }} closed release
          body: |
            Auto-generated release for closed PR #${{ github.event.pull_request.number }}.
            Source branch: `${{ github.event.pull_request.head.ref }}`
            Source commit: `${{ github.event.pull_request.head.sha }}`
          files: dist/*.whl
          fail_on_unmatched_files: true
